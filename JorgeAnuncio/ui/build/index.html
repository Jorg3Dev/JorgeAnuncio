<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Negocios GTA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        (function () {
            if (window.QSPhoneBridge && typeof window.QSPhoneBridge.create === 'function') {
                window.__qsBridgeReady = Promise.resolve()
                return
            }
            window.__qsBridgeReady = new Promise(function (resolve, reject) {
                var sources = [
                    'https://cfx-nui-qs-smartphone/web/build/bridge/qs-phone-bridge.js',
                ]
                var index = 0
                function loadNext() {
                    if (window.QSPhoneBridge && typeof window.QSPhoneBridge.create === 'function') {
                        resolve()
                        return
                    }
                    if (index >= sources.length) {
                        reject(new Error('qs_bridge_sdk_unavailable'))
                        return
                    }
                    var src = sources[index++]
                    var script = document.createElement('script')
                    script.src = src
                    script.dataset.qsBridgeSrc = src
                    script.onload = function () {
                        if (window.QSPhoneBridge && typeof window.QSPhoneBridge.create === 'function') {
                            resolve()
                            return
                        }
                        script.remove()
                        loadNext()
                    }
                    script.onerror = function () {
                        script.remove()
                        loadNext()
                    }
                    document.head.appendChild(script)
                }
                loadNext()
            })
        })()
    </script>
  <script type="module" crossorigin src="./assets/main-DayGcOtR.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-COwlKjrr.css">
</head>

</body>
